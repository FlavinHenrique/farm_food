services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: farmfood:local
    ports:
      - "8080:8080"
    environment:
      PORT: 8080
      DATABASE_URL: ${DATABASE_URL}
      DATABASE_USERNAME: ${DATABASE_USERNAME}
      DATABASE_PASSWORD: ${DATABASE_PASSWORD}
      SPRING_DATASOURCE_URL: ${SPRING_DATASOURCE_URL}
      SPRING_DATASOURCE_USERNAME: ${SPRING_DATASOURCE_USERNAME}
      SPRING_DATASOURCE_PASSWORD: ${SPRING_DATASOURCE_PASSWORD}
      SPRING_JPA_HIBERNATE_DDL_AUTO: ${SPRING_JPA_HIBERNATE_DDL_AUTO:-update}
      SPRING_JPA_SHOW_SQL: ${SPRING_JPA_SHOW_SQL:-false}
      SPRING_THYMELEAF_CACHE: ${SPRING_THYMELEAF_CACHE:-true}
      DB_POOL_MAX_SIZE: ${DB_POOL_MAX_SIZE:-5}
      DB_POOL_MIN_IDLE: ${DB_POOL_MIN_IDLE:-1}
      DB_CONNECTION_TIMEOUT_MS: ${DB_CONNECTION_TIMEOUT_MS:-30000}
    healthcheck:
      test: ["CMD-SHELL", "curl --fail http://127.0.0.1:8080/actuator/health || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 40s
