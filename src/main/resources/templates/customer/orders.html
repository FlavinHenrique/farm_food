<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meus Pedidos - Farm Food</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <style>
        .order-card {
            background: white;
            border-radius: 20px;
            padding: 1.5rem;
            margin-bottom: 1.5rem;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            border-left: 5px solid var(--primary-green);
        }
        .order-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1rem;
            padding-bottom: 0.5rem;
            border-bottom: 1px solid #f0f0f0;
        }
        .order-id {
            font-weight: 700;
            color: #333;
        }
        .order-date {
            color: #888;
            font-size: 0.9rem;
        }
        .order-status {
            padding: 0.3rem 1rem;
            border-radius: 20px;
            font-size: 0.8rem;
            font-weight: 600;
        }
        .status-finalizado { background: #e8f5e9; color: #2e7d32; }
        .status-pendente { background: #fff3e0; color: #ef6c00; }
        .order-store {
            font-weight: 600;
            margin-bottom: 0.5rem;
        }
        .order-total {
            font-size: 1.1rem;
            font-weight: 700;
            color: var(--primary-green);
        }
    </style>
</head>
<body class="profile-bg">

    <!-- Header / Navbar Minimalista -->
    <nav class="navbar bg-transparent border-0 py-4">
        <div class="container">
            <a class="navbar-brand text-primary-custom fw-bold fs-3" href="/">Farm Food</a>
            <div class="d-flex align-items-center gap-4">
                <a href="/cart" class="text-dark position-relative d-flex align-items-center justify-content-center" style="text-decoration: none;">
                    <i class="bi bi-cart fs-5"></i>
                    <span id="cart-badge" class="position-absolute top-0 start-100 translate-middle badge rounded-pill bg-danger" style="font-size: 0.6rem; display: none; pointer-events: none;">0</span>
                </a>
                <a th:href="@{/}" class="btn btn-outline-dark rounded-pill px-4 btn-sm fw-bold">Voltar para a loja</a>
            </div>
        </div>
    </nav>

    <div class="container mt-5">
        <div class="row">
            <!-- Sidebar -->
            <div class="col-lg-3 profile-sidebar">
                <a th:href="@{/customer/profile}" class="profile-menu-item">
                    <i class="bi bi-person-fill"></i> Meus dados
                </a>
                <a th:href="@{/customer/orders}" class="profile-menu-item active">
                    <i class="bi bi-bag-check-fill"></i> Meus pedidos
                </a>
                <a th:href="@{/customer/addresses}" class="profile-menu-item">
                    <i class="bi bi-geo-alt"></i> Endereços
                </a>
                <a th:href="@{/customer/payments}" class="profile-menu-item">
                    <i class="bi bi-credit-card"></i> Pagamentos
                </a>
                
                <a th:href="@{/logout}" class="logout-link">
                    Sair da conta
                </a>
            </div>

            <!-- Content -->
            <div class="col-lg-8 offset-lg-1">
                <h1 class="profile-title">Meus Pedidos</h1>
                
                <div th:if="${#lists.isEmpty(orders)}" class="text-center py-5">
                    <i class="bi bi-bag-x text-muted" style="font-size: 4rem;"></i>
                    <h3 class="mt-3">Você ainda não fez nenhum pedido</h3>
                    <p class="text-muted">Seus produtos frescos estão te esperando na loja!</p>
                    <a href="/produtos" class="btn btn-primary-custom mt-3">Ir para o catálogo</a>
                </div>

                <div th:each="order : ${orders}" class="order-card">
                    <div class="order-header">
                        <span class="order-id" th:text="'Pedido #' + ${order.id}">Pedido #123</span>
                        <span class="order-date" th:text="${#temporals.format(order.dataPedido, 'dd/MM/yyyy HH:mm')}">10/11/2023 14:30</span>
                    </div>
                    <div class="d-flex justify-content-between align-items-center">
                        <div>
                            <div class="order-store">
                                <i class="bi bi-shop me-2"></i>
                                <span th:text="${order.loja.nome}">Horta do Zé</span>
                            </div>
                            <div class="order-total" th:text="'R$ ' + ${order.valorTotal}">R$ 45,00</div>
                        </div>
                        <span class="order-status" 
                              th:classappend="${order.status == 'Finalizado' ? 'status-finalizado' : 'status-pendente'}"
                              th:text="${order.status}">Finalizado</span>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
