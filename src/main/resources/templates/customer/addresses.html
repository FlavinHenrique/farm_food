<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meus Endereços - Farm Food</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body class="profile-bg">

    
    <nav class="navbar bg-transparent border-0 py-4">
        <div class="container">
            <a class="navbar-brand text-primary-custom fw-bold fs-3" href="/">Farm Food</a>
            <div class="d-flex align-items-center gap-4">
                <a href="/cart" class="text-dark position-relative d-flex align-items-center justify-content-center" style="text-decoration: none;">
                    <i class="bi bi-cart fs-5"></i>
                    <span id="cart-badge" class="position-absolute top-0 start-100 translate-middle badge rounded-pill bg-danger" style="font-size: 0.6rem; display: none; pointer-events: none;">0</span>
                </a>
                <a th:href="@{/}" class="btn btn-outline-dark rounded-pill px-4 btn-sm fw-bold">Voltar para a loja</a>
            </div>
        </div>
    </nav>

    <div class="container mt-5">
        <div class="row">
            
            <div class="col-lg-3 profile-sidebar">
                <a th:href="@{/customer/profile}" class="profile-menu-item">
                    <i class="bi bi-person-fill"></i> Meus dados
                </a>
                <a th:href="@{/customer/orders}" class="profile-menu-item">
                    <i class="bi bi-bag-check-fill"></i> Meus pedidos
                </a>
                <a th:href="@{/customer/addresses}" class="profile-menu-item active">
                    <i class="bi bi-geo-alt"></i> Endereços
                </a>
                <a th:href="@{/customer/payments}" class="profile-menu-item">
                    <i class="bi bi-credit-card"></i> Pagamentos
                </a>
                
                <a th:href="@{/logout}" class="logout-link">
                    Sair da conta
                </a>
            </div>

            
            <div class="col-lg-8 offset-lg-1">
                <div class="d-flex justify-content-between align-items-center mb-4">
                    <h1 class="profile-title mb-0">Meus Endereços</h1>
                    <button class="btn btn-primary-custom rounded-pill px-4" data-bs-toggle="modal" data-bs-target="#addAddressModal">
                        <i class="bi bi-plus-lg me-2"></i> Novo Endereço
                    </button>
                </div>

                <div th:if="${addresses.empty}" class="text-center py-5">
                    <i class="bi bi-geo-alt text-muted fs-1 mb-3 d-block"></i>
                    <p class="text-muted">Você ainda não cadastrou nenhum endereço.</p>
                </div>

                <div class="row">
                    <div class="col-md-6 mb-4" th:each="addr : ${addresses}">
                        <div class="profile-card h-100">
                            <div class="d-flex justify-content-between align-items-start mb-3">
                                <h5 class="fw-bold mb-0" th:text="${addr.apelido}">Casa</h5>
                                <div class="dropdown">
                                    <button class="btn btn-link text-dark p-0" data-bs-toggle="dropdown">
                                        <i class="bi bi-three-dots-vertical"></i>
                                    </button>
                                    <ul class="dropdown-menu dropdown-menu-end shadow border-0">
                                        <li><a class="dropdown-item text-danger" th:href="@{'/customer/address/delete/' + ${addr.id}}">Excluir</a></li>
                                    </ul>
                                </div>
                            </div>
                            <p class="mb-1 text-muted" th:text="${addr.rua} + ', ' + ${addr.numero}"></p>
                            <p class="mb-1 text-muted" th:if="${addr.complemento != null && !addr.complemento.empty}" th:text="${addr.complemento}"></p>
                            <p class="mb-1 text-muted" th:text="${addr.bairro} + ' - ' + ${addr.cidade} + '/' + ${addr.estado}"></p>
                            <p class="mb-0 text-muted" th:text="${addr.cep}"></p>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    
    <div class="modal fade" id="addAddressModal" tabindex="-1">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content border-0 shadow rounded-4">
                <div class="modal-header border-0 pb-0">
                    <h5 class="modal-title fw-bold">Novo Endereço</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <form th:action="@{/customer/address/save}" th:object="${newAddress}" method="POST">
                        <div class="mb-3">
                            <label class="form-label small fw-bold">Apelido (ex: Casa, Trabalho)</label>
                            <input type="text" class="form-control profile-input" th:field="*{apelido}" required>
                        </div>
                        <div class="row">
                            <div class="col-md-8 mb-3">
                                <label class="form-label small fw-bold">Rua</label>
                                <input type="text" class="form-control profile-input" th:field="*{rua}" id="rua-field" required>
                            </div>
                            <div class="col-md-4 mb-3">
                                <label class="form-label small fw-bold">Número</label>
                                <input type="text" class="form-control profile-input" th:field="*{numero}" id="numero-field" required>
                            </div>
                        </div>
                        <div class="mb-3">
                            <label class="form-label small fw-bold">Complemento (opcional)</label>
                            <input type="text" class="form-control profile-input" th:field="*{complemento}">
                        </div>
                        <div class="row">
                            <div class="col-md-6 mb-3">
                                <label class="form-label small fw-bold">CEP</label>
                                <div class="input-group">
                                    <input type="text" class="form-control profile-input" th:field="*{cep}" id="cep-field" required>
                                    <button class="btn btn-outline-secondary" type="button" onclick="consultarCep()">Buscar</button>
                                </div>
                                <div id="cep-error-msg" class="text-danger small mt-1" style="display: none;"></div>
                            </div>
                            <div class="col-md-6 mb-3">
                                <label class="form-label small fw-bold">Bairro</label>
                                <input type="text" class="form-control profile-input" th:field="*{bairro}" id="bairro-field" required>
                            </div>
                        </div>
                        <div class="row">
                            <div class="col-md-8 mb-3">
                                <label class="form-label small fw-bold">Cidade</label>
                                <input type="text" class="form-control profile-input" th:field="*{cidade}" id="cidade-field" required>
                            </div>
                            <div class="col-md-4 mb-3">
                                <label class="form-label small fw-bold">Estado (UF)</label>
                                <input type="text" class="form-control profile-input" th:field="*{estado}" id="estado-field" maxlength="2" required>
                            </div>
                        </div>
                        <div class="mt-4">
                            <button type="submit" class="btn btn-primary-custom w-100 rounded-pill py-2 fw-bold">Salvar Endereço</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        function consultarCep() {
            const cep = document.getElementById('cep-field').value.replace(/\D/g, '');
            const errorElement = document.getElementById('cep-error-msg');
            
            if (cep.length !== 8) {
                errorElement.innerText = "Digite um CEP válido (8 números).";
                errorElement.style.display = 'block';
                return;
            }

            errorElement.style.display = 'none';
            const btn = event.target;
            const originalText = btn.innerText;
            btn.disabled = true;
            btn.innerText = '...';

            fetch(`https://viacep.com.br/ws/${cep}/json/`)
                .then(response => response.json())
                .then(data => {
                    if (data.erro) {
                        errorElement.innerText = "CEP não encontrado.";
                        errorElement.style.display = 'block';
                    } else {
                        document.getElementById('rua-field').value = data.logradouro;
                        document.getElementById('bairro-field').value = data.bairro;
                        document.getElementById('cidade-field').value = data.localidade;
                        document.getElementById('estado-field').value = data.uf;
                        document.getElementById('numero-field').focus();
                    }
                })
                .catch(error => {
                    console.error('Erro:', error);
                    errorElement.innerText = "Erro ao buscar CEP.";
                    errorElement.style.display = 'block';
                })
                .finally(() => {
                    btn.disabled = false;
                    btn.innerText = originalText;
                });
        }
    </script>
</body>
</html>
