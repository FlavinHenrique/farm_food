<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meu Perfil - Farm Food</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body class="profile-bg">

    <!-- Header / Navbar Minimalista -->
    <nav class="navbar bg-transparent border-0 py-4">
        <div class="container">
            <a class="navbar-brand text-primary-custom fw-bold fs-3" href="/">Farm Food</a>
            <div class="d-flex align-items-center gap-4">
                <a href="/cart" class="text-dark position-relative d-flex align-items-center justify-content-center" style="text-decoration: none;">
                    <i class="bi bi-cart fs-5"></i>
                    <span id="cart-badge" class="position-absolute top-0 start-100 translate-middle badge rounded-pill bg-danger" style="font-size: 0.6rem; display: none; pointer-events: none;">0</span>
                </a>
                <a th:href="@{/}" class="btn btn-outline-dark rounded-pill px-4 btn-sm fw-bold">Voltar para a loja</a>
            </div>
        </div>
    </nav>

    <!-- Ilustrações de Fundo (Simuladas com SVG ou FontIcons) -->
    <img src="https://www.svgrepo.com/show/368541/botanical-leaf-1.svg" class="profile-illustration-left" alt="">
    <img src="https://www.svgrepo.com/show/368545/botanical-leaf-5.svg" class="profile-illustration-right" alt="">
    <img src="https://www.svgrepo.com/show/368543/botanical-leaf-3.svg" class="profile-illustration-bottom" alt="">

    <div class="container mt-5">
        <div class="row">
            <!-- Sidebar -->
            <div class="col-lg-3 profile-sidebar">
                <a th:href="@{/customer/profile}" class="profile-menu-item active">
                    <i class="bi bi-person-fill"></i> Meus dados
                </a>
                <a th:href="@{/customer/orders}" class="profile-menu-item">
                    <i class="bi bi-bag-check-fill"></i> Meus pedidos
                </a>
                <a th:href="@{/customer/addresses}" class="profile-menu-item">
                    <i class="bi bi-geo-alt"></i> Endereços
                </a>
                <a th:href="@{/customer/payments}" class="profile-menu-item">
                    <i class="bi bi-credit-card"></i> Pagamentos
                </a>
                
                <a th:href="@{/logout}" class="logout-link">
                    Sair da conta
                </a>
            </div>

            <!-- Content -->
            <div class="col-lg-8 offset-lg-1">
                <h1 class="profile-title" th:text="${usuario.nome}">Nome do cliente</h1>
                
                <div class="profile-card">
                    <form th:action="@{/customer/profile/update}" method="POST" th:object="${usuario}">
                        <div class="mb-3">
                            <input type="text" class="form-control profile-input" th:field="*{nome}" placeholder="Nome">
                        </div>
                        <div class="mb-3">
                            <input type="email" class="form-control profile-input" th:field="*{email}" placeholder="Email">
                        </div>
                        <div class="mb-3">
                            <input type="text" class="form-control profile-input" th:field="*{telefone}" placeholder="Telefone">
                        </div>
                        <div class="row">
                            <div class="col-md-7">
                                <input type="text" class="form-control profile-input" th:field="*{cpf}" placeholder="CPF">
                            </div>
                            <div class="col-md-5">
                                <input type="text" class="form-control profile-input" placeholder="Data de nascimento (opcional)">
                            </div>
                        </div>
                        <div class="mb-3">
                            <input type="password" class="form-control profile-input" placeholder="Nova senha (opcional)" name="novaSenha">
                        </div>
                        
                        <div class="clearfix">
                            <button type="submit" class="btn btn-edit-profile">Salvar</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        // Atualizar contador do carrinho
        function updateCartBadge() {
            const cart = JSON.parse(localStorage.getItem('farmfood_cart')) || [];
            const badge = document.getElementById('cart-badge');
            if (badge) {
                const totalItems = cart.reduce((sum, item) => sum + item.qty, 0);
                if (totalItems > 0) {
                    badge.innerText = totalItems;
                    badge.style.display = 'block';
                } else {
                    badge.style.display = 'none';
                }
            }
        }
        document.addEventListener('DOMContentLoaded', updateCartBadge);
    </script>
</body>
</html>
