<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Histórico de Entregas - Farm Food</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <style>
        body { background: #f6f8f6; }
        .shell { padding: 1.25rem 0 2rem; }
        .panel { background: #fff; border-radius: 24px; padding: 1.5rem; box-shadow: 0 10px 35px rgba(0,0,0,.05); }
        .history-card { border: 1px solid #edf1ed; border-radius: 18px; padding: 1rem; margin-bottom: .9rem; }
        .money { color: var(--primary-color); font-weight: 800; }
        .meta { color: #667085; font-size: .92rem; }
    </style>
</head>
<body>
    <nav class="navbar bg-white border-bottom sticky-top">
        <div class="container">
            <a class="navbar-brand fw-bold text-primary-custom" th:href="@{/delivery/dashboard}">
                <i class="bi bi-truck me-2"></i>Farm Food Entregas
            </a>
            <div class="d-flex align-items-center gap-3">
                <a th:href="@{/delivery/dashboard}" class="text-decoration-none text-dark fw-semibold">Dashboard</a>
                <a th:href="@{/logout}" class="text-decoration-none text-muted">Sair</a>
            </div>
        </div>
    </nav>

    <div class="container shell">
        <div class="panel">
            <div class="d-flex justify-content-between align-items-start flex-wrap gap-3">
                <div>
                    <div class="text-muted small">Registro operacional</div>
                    <h1 class="h3 fw-bold mb-1">Histórico de entregas</h1>
                    <div class="text-muted">Pedidos concluídos, cancelados ou com ocorrência, com data, cliente e valor de frete.</div>
                </div>
                <button id="btn-refresh-history" class="btn btn-outline-secondary" type="button">
                    <i class="bi bi-arrow-clockwise me-1"></i>Atualizar
                </button>
            </div>

            <div id="history-list" class="mt-4"></div>
            <div id="history-empty" class="text-center text-muted py-5 d-none">
                <i class="bi bi-clock-history fs-1 d-block mb-2"></i>
                <div class="fw-semibold">Nenhum registro encontrado</div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script th:src="@{/js/deliveryHistory.js}" defer></script>
</body>
</html>
