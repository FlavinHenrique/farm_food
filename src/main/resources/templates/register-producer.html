<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro Produtor - Farm Food</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <style>
        .register-container {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background-color: #e8f5e9;
        }
        .register-card {
            background: white;
            padding: 3rem;
            border-radius: 30px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.05);
            max-width: 550px;
            width: 100%;
        }
        .producer-icon-header {
            width: 80px;
            height: 80px;
            background-color: var(--primary-color);
            color: white;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 1.5rem;
            font-size: 2.5rem;
        }
        .form-control {
            border-radius: 10px;
            padding: 0.8rem 1.2rem;
            border: 1px solid #eee;
        }
        .form-control:focus {
            box-shadow: none;
            border-color: var(--primary-color);
        }
        .badge-producer {
            background-color: var(--primary-color);
            color: white;
            padding: 0.5rem 1rem;
            border-radius: 20px;
            font-size: 0.8rem;
            margin-bottom: 1rem;
            display: inline-block;
        }
    </style>
</head>
<body>

    <div class="register-container">
        <div class="register-card">
            <div class="text-center">
                <div class="badge-producer">Área do Produtor</div>
                <div class="producer-icon-header">
                    <i class="bi bi-shop"></i>
                </div>
                <h2 class="fw-bold mb-1">Cadastre sua Loja</h2>
                <p class="text-muted mb-4">Comece a vender seus produtos veganos hoje mesmo!</p>
            </div>

            <div th:if="${error}" class="alert alert-danger alert-dismissible fade show border-0 rounded-4 mb-4" role="alert">
                <i class="bi bi-exclamation-triangle-fill me-2"></i>
                <span th:text="${error}">Mensagem de erro</span>
                <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
            </div>

            <form th:action="@{/register/producer}" th:object="${user}" method="post">
                <div class="row">
                    <div class="col-md-12 mb-3">
                        <label class="form-label fw-bold">Nome do Responsável / Razão Social</label>
                        <input type="text" th:field="*{nome}" class="form-control" placeholder="Seu nome ou nome da empresa" required>
                    </div>
                </div>
                <div class="row">
                    <div class="col-md-12 mb-3">
                        <label class="form-label fw-bold">CNPJ</label>
                        <input type="text" th:field="*{cnpj}" class="form-control" placeholder="00.000.000/0000-00" required>
                    </div>
                </div>
                <div class="mb-3">
                    <label class="form-label fw-bold">E-mail Profissional</label>
                    <input type="email" th:field="*{email}" class="form-control" placeholder="contato@sualoja.com" required>
                </div>
                <div class="mb-4">
                    <label class="form-label fw-bold">Senha de Acesso</label>
                    <input type="password" th:field="*{senha}" class="form-control" placeholder="••••••••" required>
                </div>
                
                <button type="submit" class="btn btn-primary-custom w-100 mb-3">Finalizar Cadastro de Produtor</button>
                
                <div class="text-center">
                    <p class="text-muted small">Já é um produtor parceiro? <a href="#" class="text-success fw-bold text-decoration-none">Entrar no Painel</a></p>
                    <a th:href="@{/register}" class="text-muted small text-decoration-none"><i class="bi bi-arrow-left"></i> Voltar para Cadastro de Cliente</a>
                </div>
            </form>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
