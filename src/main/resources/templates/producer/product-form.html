<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastrar Produto - Food Farmer</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <style>
        .form-container {
            max-width: 700px;
            margin: 4rem auto;
            background: white;
            padding: 3rem;
            border-radius: 30px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.05);
        }
        .form-control, .form-select {
            border-radius: 10px;
            padding: 0.8rem 1.2rem;
            border: 1px solid #eee;
        }
    </style>
</head>
<body class="bg-light">

    <div class="container">
        <div class="form-container">
            <div class="text-center mb-5">
                <div class="btn btn-success rounded-circle mb-3" style="width: 60px; height: 60px; display: flex; align-items: center; justify-content: center;">
                    <i class="bi bi-box-seam fs-3 text-white"></i>
                </div>
                <h2 class="fw-bold" th:text="${product.id != null ? 'Editar Produto' : 'Novo Produto'}">Novo Produto</h2>
                <p class="text-muted" th:text="${product.id != null ? 'Atualize as informações do seu produto' : 'Adicione um novo item ao catálogo da sua loja'}">Adicione um novo item ao catálogo da sua loja</p>
            </div>

            <form th:action="@{/producer/product/save}" th:object="${product}" method="post">
                <input type="hidden" th:field="*{id}">
                
                <input type="hidden" th:field="*{loja.id}" name="lojaId">
                
                <div class="row">
                    <div class="col-md-8 mb-3">
                        <label class="form-label fw-bold">Nome do Produto</label>
                        <input type="text" th:field="*{nome}" class="form-control" placeholder="Ex: Alface Crespa Orgânica" required>
                    </div>
                    <div class="col-md-4 mb-3">
                        <label class="form-label fw-bold">Unidade</label>
                        <select th:field="*{unidade}" class="form-select" required>
                            <option value="kg">Quilo (kg)</option>
                            <option value="un">Unidade (un)</option>
                            <option value="maço">Maço</option>
                            <option value="g">Gramas (g)</option>
                        </select>
                    </div>
                </div>

                <div class="row">
                    <div class="col-md-4 mb-3">
                        <label class="form-label fw-bold">Preço (R$)</label>
                        <input type="number" step="0.01" th:field="*{preco}" class="form-control" placeholder="0,00" required>
                    </div>
                    <div class="col-md-4 mb-3">
                        <label class="form-label fw-bold">Estoque</label>
                        <input type="number" th:field="*{estoque}" class="form-control" placeholder="0">
                    </div>
                    <div class="col-md-4 mb-3">
                        <label class="form-label fw-bold">Categoria</label>
                        <div class="input-group">
                            <select th:field="*{categoria.id}" class="form-select" required>
                                <option value="" disabled selected>Selecione...</option>
                                <option th:each="cat : ${categories}" th:value="${cat.id}" th:text="${cat.nome}">Legumes</option>
                            </select>
                            <button class="btn btn-outline-success" type="button" data-bs-toggle="modal" data-bs-target="#categoryModal">
                                <i class="bi bi-plus-lg"></i>
                            </button>
                        </div>
                    </div>
                </div>

                <div class="mb-3">
                    <label class="form-label fw-bold">Descrição</label>
                    <textarea th:field="*{descricao}" class="form-control" rows="3" placeholder="Detalhes sobre o cultivo, frescor, etc."></textarea>
                </div>

                <div class="mb-4">
                    <label class="form-label fw-bold">URL da Imagem do Produto</label>
                    <input type="url" th:field="*{urlImagem}" class="form-control" placeholder="https://exemplo.com/produto.jpg" required>
                </div>

                <div class="mb-4">
                    <div class="row">
                        <div class="col-md-6">
                            <div class="form-check form-switch">
                                <input class="form-check-input" type="checkbox" th:field="*{ativo}" id="ativoSwitch">
                                <label class="form-check-label fw-bold" for="ativoSwitch">Produto Ativo</label>
                            </div>
                        </div>
                        <div class="col-md-6">
                            <div class="form-check form-switch">
                                <input class="form-check-input" type="checkbox" th:field="*{emPromocao}" id="onSaleSwitch">
                                <label class="form-check-label fw-bold" for="onSaleSwitch">Produto em Oferta?</label>
                            </div>
                        </div>
                    </div>
                </div>

                <div id="discountContainer" class="mb-4" style="display: none;">
                    <label class="form-label fw-bold">Porcentagem de Desconto (%)</label>
                    <input type="number" th:field="*{percentualDesconto}" class="form-control" placeholder="Ex: 10" min="0" max="100">
                    <small class="text-muted">Este valor será exibido como selo de desconto no produto.</small>
                </div>
                
                <div class="d-grid gap-2">
                    <button type="submit" class="btn btn-primary-custom">Cadastrar Produto</button>
                    <a th:href="@{/producer/products}" class="btn btn-light rounded-pill">Cancelar</a>
                </div>
            </form>
        </div>
    </div>

    
    <div class="modal fade" id="categoryModal" tabindex="-1" aria-labelledby="categoryModalLabel" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content rounded-4 border-0 shadow">
                <div class="modal-header border-0 pb-0">
                    <h5 class="modal-title fw-bold" id="categoryModalLabel">Nova Categoria</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body p-4">
                    <p class="text-muted small mb-4">Crie uma nova categoria para organizar seus produtos.</p>
                    <form th:action="@{/producer/category/save}" th:object="${newCategory}" method="post">
                        
                        <input type="hidden" name="storeId" th:value="${storeId}">
                        
                        <div class="mb-3">
                            <label class="form-label fw-bold">Nome da Categoria</label>
                            <input type="text" th:field="*{nome}" class="form-control" placeholder="Ex: Queijos, Temperos, Ovos..." required>
                        </div>
                        <div class="mb-4">
                            <label class="form-label fw-bold">Ícone (Bootstrap Icon)</label>
                            <input type="text" th:field="*{icone}" class="form-control" placeholder="Ex: bi-egg, bi-cheese, bi-box-seam" required>
                            <small class="text-muted">Veja os nomes em <a href="https://icons.getbootstrap.com/" target="_blank">Bootstrap Icons</a></small>
                        </div>
                        <div class="d-grid gap-2">
                            <button type="submit" class="btn btn-primary-custom">Salvar Categoria</button>
                            <button type="button" class="btn btn-light" data-bs-dismiss="modal">Cancelar</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        const onSaleSwitch = document.getElementById('onSaleSwitch');
        const discountContainer = document.getElementById('discountContainer');

        function toggleDiscountField() {
            if (onSaleSwitch.checked) {
                discountContainer.style.display = 'block';
            } else {
                discountContainer.style.display = 'none';
                document.getElementById('percentualDesconto').value = '';
            }
        }

        onSaleSwitch.addEventListener('change', toggleDiscountField);
        
        // Executa ao carregar a página (para casos de edição)
        window.onload = toggleDiscountField;
    </script>
</body>
</html>
