<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Perfil do Produtor - Farm Food</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <style>
        body { background-color: var(--light-gray, #f9f9f9); }
        .profile-card {
            background: white;
            border-radius: 20px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.05);
            padding: 2rem;
            margin-bottom: 2rem;
        }
        .section-title {
            font-weight: 700;
            font-size: 1.3rem;
            margin-bottom: 1.5rem;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .form-control, .form-select {
            border-radius: 10px;
            padding: 0.75rem 1rem;
            border: 1px solid #ddd;
        }
        .form-control:focus, .form-select:focus {
            border-color: var(--primary-color);
            box-shadow: 0 0 0 0.25rem rgba(45, 90, 39, 0.25);
        }
    </style>
</head>
<body>

    
    <nav class="navbar navbar-expand-lg sticky-top shadow-sm">
        <div class="container">
            <a class="navbar-brand" th:href="@{/}">Farm Food</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav mx-auto">
                    <li class="nav-item"><a class="nav-link" th:href="@{/producer/stores}">Lojas</a></li>
                    <li class="nav-item"><a class="nav-link" th:href="@{/producer/products}">Produtos</a></li>
                    <li class="nav-item"><a class="nav-link" th:href="@{/producer/vendas}">Vendas</a></li>
                    <li class="nav-item"><a class="nav-link active" th:href="@{/producer/profile}">Perfil</a></li>
                </ul>
                <div class="d-flex align-items-center gap-3">
                    <a th:href="@{/logout}" class="btn btn-outline-primary-custom btn-sm">Sair</a>
                </div>
            </div>
        </div>
    </nav>

    <div class="container py-5">
        <h2 class="fw-bold mb-4">Meu Perfil</h2>

        <form th:action="@{/producer/profile/save}" th:object="${produtor}" method="post">
            <div class="profile-card">
                <h4 class="section-title"><i class="bi bi-person text-success"></i> Dados Pessoais</h4>
                <div class="row g-3">
                    <div class="col-md-6">
                        <label class="form-label">Nome completo *</label>
                        <input type="text" class="form-control" th:field="*{nome}" required>
                    </div>
                    <div class="col-md-6">
                        <label class="form-label">Nome da empresa/fazenda</label>
                        <input type="text" class="form-control" th:field="*{nomeEmpresa}">
                    </div>
                    <div class="col-md-6">
                        <label class="form-label">CPF</label>
                        <input type="text" class="form-control" th:field="*{cpf}">
                    </div>
                    <div class="col-md-6">
                        <label class="form-label">CNPJ</label>
                        <input type="text" class="form-control" th:field="*{cnpj}">
                    </div>
                    <div class="col-md-6">
                        <label class="form-label">E-mail *</label>
                        <input type="email" class="form-control" th:field="*{email}" required>
                    </div>
                    <div class="col-md-6">
                        <label class="form-label">Telefone</label>
                        <input type="text" class="form-control" th:field="*{telefone}">
                    </div>
                    <div class="col-md-6">
                        <label class="form-label">URL da foto de perfil</label>
                        <input type="text" class="form-control" th:field="*{urlFotoPerfil}">
                    </div>
                    <div class="col-md-6">
                        <label class="form-label">URL da foto de capa</label>
                        <input type="text" class="form-control" th:field="*{urlFotoCapa}">
                    </div>
                </div>
            </div>

            <div class="profile-card">
                <h4 class="section-title"><i class="bi bi-lock text-success"></i> Alterar Senha</h4>
                <div class="row g-3">
                    <div class="col-md-6">
                        <label class="form-label">Nova senha (deixe em branco para não alterar)</label>
                        <input type="password" class="form-control" name="newPassword">
                    </div>
                </div>
            </div>

            <div class="text-end">
                <button type="submit" class="btn btn-primary-custom px-5">Salvar Alterações</button>
            </div>
        </form>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
